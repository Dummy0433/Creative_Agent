# 管理员可调默认值（设计团队维护，git 管理）
# 用户请求中未提供的参数将使用这里的值

# ── 模型选择 ────────────────────────────────────────────────
analyze_model: "gemini-3.1-flash-lite-preview"
prompt_model: "gemini-3.1-flash-lite-preview"
image_provider: "gemini"
image_models:
  - "gemini-3.1-flash-image-preview"
  - "gemini-3-pro-image-preview"

# ── 图片参数 ────────────────────────────────────────────────
image_aspect_ratio: "1:1"
image_size: "1K"
candidate_count: 4

# ── 超时（秒）──────────────────────────────────────────────
text_timeout: 60
image_timeout: 180

# ── 后处理 ──────────────────────────────────────────────────
enable_postprocess: true

# ── CLI / 默认请求参数 ──────────────────────────────────────
default_region: "MENA"
default_subject: "雄狮"
default_price: 1

# ── 提示词覆盖（null = 使用 prompts/*.md 文件）──────────────
analyze_system_prompt: null
prompt_gen_system_prompt: null

# ── 编辑流 ────────────────────────────────────────────────
edit_provider: "gemini"
edit_models:
  - "gemini-3.1-flash-image-preview"
edit_timeout: 120
edit_max_rounds: 10
edit_session_ttl: 1800

# ── 层级配置 ──────────────────────────────────────────────────
# 每个层级可独立配置提示词文件和可选的模型/图片参数覆盖
# 未配置的层级使用全局默认提示词 (analyze_system.md / prompt_gen_system.md)
tier_profiles:
  P0:
    analyze_prompt_file: "analyze_P0.md"
    prompt_gen_prompt_file: "prompt_gen_P0.md"
  P1:
    analyze_prompt_file: "analyze_P1.md"
    prompt_gen_prompt_file: "prompt_gen_P1.md"
  P2:
    analyze_prompt_file: "analyze_P2.md"
    prompt_gen_prompt_file: "prompt_gen_P2.md"

# ── Calendar 看板 ──────────────────────────────────────────────
calendar_app_token: "FJucbi5B0aCnpbsBDGelU0NFgug"
calendar_quarters:
  Q1:
    table_id: "tblQPUBfShTwkIxb"
    view_id: "vew6G1bwqT"
  Q2:
    table_id: ""
    view_id: ""
