server {
    listen 80;
    server_name _;

    # 将 /gift/ 路径转发到 gift-prompt 服务
    location /gift/ {
        proxy_pass http://gift-prompt:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;  # 生图最长 3 分钟
        proxy_send_timeout 300s;
    }

    # 健康检查（直接暴露给监控）
    location /health {
        proxy_pass http://gift-prompt:8000/health;
    }
}
