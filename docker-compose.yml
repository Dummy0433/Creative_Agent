services:
  gift-prompt:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./generation_defaults.yaml:/app/generation_defaults.yaml:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - gift-prompt
